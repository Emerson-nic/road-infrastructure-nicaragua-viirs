name: R + Python Data Pipeline QC

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system GIS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ hashFiles('.github/workflows/r_python_qc.yml') }}
          restore-keys: |
            ${{ runner.os }}-r-

      - name: Install R packages and run pipeline
        run: |
          Rscript -e "
            options(repos = c(CRAN = 'https://cloud.r-project.org'));
            if (!require('pacman')) install.packages('pacman');
            pacman::p_load(
              sf, terra, exactextractr, blackmarbler,
              fixest, dplyr, readxl, janitor
            )
          "
          Rscript Scripts/obtener_datos.R
        env:
          NASA_EARTHDATA_TOKEN: ${{ secrets.NASA_EARTHDATA_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies and run cleaning
        run: |
          pip install pandas numpy
          python dashboard/limpieza.py

      - name: Verify outputs
        run: |
          test -f csv/panel_final.csv && echo "panel_final.csv OK"
          test -f csv/panel_final_limpio.csv && echo "panel_final_limpio.csv OK"
