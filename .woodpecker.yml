when:
  branch: main
  event: [push, pull_request]

steps:
  r-pipeline:
    image: rocker/geospatial
    commands:
      - Rscript -e "
          options(repos = c(CRAN = 'https://cloud.r-project.org'));
          if (!require('pacman')) install.packages('pacman');
          pacman::p_load(
            sf, terra, exactextractr, blackmarbler,
            fixest, dplyr, readxl, janitor
          )
        "
      - Rscript Scripts/obtener_datos.R
    environment:
      NASA_EARTHDATA_TOKEN:
        from_secret: nasa_earthdata_token

  python-cleaning:
    image: python:3.11-slim
    commands:
      - pip install pandas numpy
      - python dashboard/limpieza.py

  verify-outputs:
    image: alpine:3.19
    commands:
      - test -f csv/panel_final.csv && echo "panel_final.csv OK"
      - test -f csv/panel_final_limpio.csv && echo "panel_final_limpio.csv OK"
